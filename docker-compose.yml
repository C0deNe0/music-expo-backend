version: "3.9"

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - REDIS_URL=redis:6379
      - MONGO_URI=${MONGO_URI}
      - DB_NAME=${DB_NAME}
    depends_on:
      - redis

  redis:
    image: redis:7
    ports:
      - "6379:6379"
